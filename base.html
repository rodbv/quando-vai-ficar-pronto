<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Test</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --primary: #b22222;
                --green: #2d8c57;
                --secondary: #65212a;
                --paper: #f2f2f2;
                --stage: #d4d4d8;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: var(--stage);
                font-family: "Ubuntu", Tahoma, Geneva, Verdana, sans-serif;
            }

            .capa {
                position: relative;
                width: min(92vw, 1280px);
                aspect-ratio: 16 / 9;
                overflow: hidden;
                background: var(--paper);
            }

            .left-panel {
                position: absolute;
                inset: 0 auto 0 0;
                width: 67%;
                background: var(--primary);
                clip-path: polygon(0 0, 100% 0, 82% 100%, 0 100%);
            }

            .stripe {
                position: absolute;
                top: -8%;
                bottom: -8%;
                left: 49%;
                width: 25%;
                background: var(--secondary);
                transform: skewX(-30deg);
                transform-origin: center;
                z-index: 2;
            }

            .content {
                position: relative;
                z-index: 3;
                color: #fff;
                max-width: 52%;
                padding: 4.5rem 3rem 0;
            }

            h1 {
                margin: 0;
                font-size: clamp(2.8rem, 6vw, 5rem);
                line-height: 1.06;
                font-weight: 700;
                letter-spacing: -0.02em;
            }

            .subtitle {
                margin: 1.6rem 0 0;
                font-size: clamp(1.2rem, 2.5vw, 3rem);
                line-height: 1.35;
                font-weight: 400;
            }

            .logo {
                position: absolute;
                right: 2.2rem;
                bottom: 1.6rem;
                width: min(25.5%, 320px);
                height: auto;
                z-index: 3;
            }

        </style>
    </head>
    <body>
        <div class="capa">
            <div class="left-panel"></div>
            <div class="stripe"></div>
            <div class="content">
                <h1>Quando vai ficar<br>pronto?</h1>
                <p class="subtitle">Respondendo a pergunta mais importante<br>do seu cliente</p>
            </div>
            <img class="logo" src="/slides/public/pysul-logo.svg" alt="Python Sul 2026 Londrina - PR">
        </div>
    </body>
</html>
